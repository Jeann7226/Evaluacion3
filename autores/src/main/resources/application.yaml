logging:
  file:
    name: logs/tienda-manga.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      file-name-pattern: "${LOG_FILE}.%d{yyyy-MM-dd}.%i.log"
      max-history: 10
      total-size-cap: 1GB

spring:
  application:
    name: autores
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/db_tienda_manga_autores?createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http//localhost:8761/eureka/}

springdoc:
  api-docs:
    path: /api/v1/autores/v3/api-docs

springdoc.cache.disabled: true