logging:
  file:
    name: logs/tienda-manga.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      file-name-pattern: "${LOG_FILE}.%d{yyyy-MM-dd}.%i.log"
      max-history: 10
      total-size-cap: 1GB

spring:
  application:
    name: autores
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql-db}:3306/db_tienda_manga_autores?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8082

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:eureka-server}:8761/eureka/

springdoc:
  api-docs:
    path: /api/v1/autores/v3/api-docs