spring:
  profiles:
    active: dev
  application:
    name: mangas
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/db_tienda_manga_mangas?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: false 

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8081

springdoc:
  api-docs:
    path: /api/v1/mangas/v3/api-docs

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8081}

springdoc:
  api-docs:
    path: /api/v1/mangas/v3/api-docs
logging:
  level:
    com.manga.mangas: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG