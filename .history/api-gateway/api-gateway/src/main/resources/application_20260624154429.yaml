server:
  port: 8080 # Este es el puerto oficial del Gateway (El recepcionista)

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Lo dejamos encendido para cuando uses Eureka
      routes:
        # --- RUTA HACIA TU MICROSERVICIO DE MANGAS ---
        - id: mangas-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/mangas/**, /api/v1/demografias/**, /api/v1/inventarios/**
