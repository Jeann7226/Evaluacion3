spring.application.name=mangas
# 1. Puerto del microservicio
server.port=8081

# 2. Configuracion de Base de Datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_mangas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# 3. JPA / Hibernate (Desactivamos la creacion automatica para usar Flyway)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# 4. Activacion de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# 5. Configuracion de Swagger (Holocron)
springdoc.swagger-ui.path=/doc/swagger-ui/index.html
springdoc.api-docs.path=/api-docs
