server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: mangas-service 
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/mangas/**, /api/v1/demografias/**, /api/v1/inventarios/**, /doc/**

            - id: autores-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/autores/**, /api/v1/generos/**, /api/v1/origenes/**, /doc/**

            - id: usuarios-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/usuarios/**, /api/v1/carritos/**, /api/v1/pagos/**, /api/v1/resenas/**, /doc/**
            
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Microservicio Mangas
        url: http://localhost:8081/doc/v3/api-docs
      - name: Microservicio Autores
        url: http://localhost:8082/doc/v3/api-docs
      - name: Microservicio Usuarios
        url: http://localhost:8083/doc/v3/api-docs