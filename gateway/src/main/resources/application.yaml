server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: mangas-service 
              uri: http://mangas-service:8081
              predicates:
                - Path=/api/v1/mangas/**, /api/v1/demografias/**, /api/v1/inventarios/**

            - id: autores-service
              uri: http://autores-service:8082
              predicates:
                - Path=/api/v1/autores/**, /api/v1/generos/**, /api/v1/origenes/**

            - id: usuarios-service
              uri: http://usuarios-service:8083
              predicates:
                - Path=/api/v1/usuarios/**, /api/v1/carritos/**, /api/v1/pagos/**, /api/v1/resenas/**
            
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Microservicio Mangas
        url: /api/v1/mangas/v3/api-docs
      - name: Microservicio Autores
        url: /api/v1/autores/v3/api-docs
      - name: Microservicio Usuarios
        url: /api/v1/usuarios/v3/api-docs