server:
  port: 8083

spring:
  application:
    name: usuarios
    
  datasource:
    url: jdbc:mysql://localhost:3306/db_tienda_manga?createDatabaseIfNotExist=true
    username: root
    password: ""
    driverClassName: com.mysql.cj.jdbc.Driver

  
  
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    
  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  file:
    name: logs/tienda-manga.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      file-name-pattern: "${LOG_FILE}-%d{yyyy-MM-dd}.%i.gz"
      max-history: 7
      total-size-cap: 100MB
      
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /autores/api-docs

